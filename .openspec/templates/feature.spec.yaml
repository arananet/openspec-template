# Feature Spec — created by gh openspec scaffold
# Fill in all sections before moving status to 'review'.
# Acceptance criteria are your definition of done — be specific.

title: "{{FEATURE_NAME}}"
slug: "{{SLUG}}"
type: feature
status: {{STATUS}}   # draft | review | approved

author: "{{AUTHOR}}"
created_at: "{{DATE}}"
updated_at: "{{DATE}}"

description: |
  <!-- One paragraph describing WHAT this feature does and WHY it exists.
       Focus on the user or system outcome, not the implementation approach. -->

acceptance_criteria:
  - "<!-- Given <context>, when <action>, then <outcome> -->"
  - "<!-- Add as many as needed. These drive QA and code review. -->"

test_plan:
  - "<!-- Unit test: <what function/module is tested and what it asserts> -->"
  - "<!-- Integration test (if applicable): <what flow is tested end-to-end> -->"

qa_notes: |
  <!-- Manual QA steps, edge cases to verify, or environments to test in.
       Leave blank if fully covered by automated tests. -->

out_of_scope:
  - "<!-- Explicitly list things NOT included so reviewers don't assume. -->"

implementation_skill: null
  # Optional: name of the domain skill to invoke when implementing this spec.
  # Overrides agents.implementation_skills.default in config.yaml.
  # Examples: "frontend-pro", "backend-pro", "data-eng-pro", "devops-pro", "mobile-pro"

technical_notes: |
  <!-- Optional: constraints, dependencies, architecture decisions.
       Do not design the solution here — save implementation details for the PR. -->

linked_issues: []
  # - "https://github.com/{{GITHUB_OWNER}}/{{PROJECT_NAME}}/issues/1"

linked_prs: []
  # - "https://github.com/{{GITHUB_OWNER}}/{{PROJECT_NAME}}/pull/1"
