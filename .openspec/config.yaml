# OpenSpec Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file is intentionally blank. Fill it in one of two ways:
#
#   A) Open this project in Claude Code — it reads CLAUDE.md, detects the
#      blank fields below, and interviews you to fill them in automatically.
#
#   B) Edit manually — replace every value in quotes below with your own.
#
# The CI workflow will create a GitHub issue reminding you to do this if the
# placeholder tokens are still present on your first push.
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "{{PROJECT_NAME}}"
  owner: "{{GITHUB_OWNER}}"
  team: "{{TEAM_NAME}}"
  domain: "{{PROJECT_DOMAIN}}"
  description: "{{PROJECT_DESCRIPTION}}"
  tech_stack: "{{TECH_STACK}}"   # comma-separated, e.g. "python, fastapi, docker"

spec:
  required_fields:
    - title
    - description
    - acceptance_criteria
    - test_plan
    - status
  enforce_on_pr: true
  enforce_on_commit: true
  min_acceptance_criteria: 1
  statuses:
    - draft
    - review
    - approved
  approved_required_for_merge: false

testing:
  require_tests: true
  test_command: "{{TEST_COMMAND}}"
  coverage_threshold: null
  fail_on_missing_tests: true

ci:
  fail_on_missing_spec: true
  fail_on_draft_spec: false
  run_tests: true
  fail_on_test_failure: true
  fail_on_missing_tests: true
  notify_slack: false
  slack_webhook: ""

agents:
  spec_review:
    enabled: true
    model: "openai/gpt-4o-mini"
    trigger: "pull_request"
    post_as: "pr-comment"
    goal_file: ".github/agents/spec-review.md"

  # ── Issue auto-fix agent
  # When a CODEOWNER applies the configured label to an issue, an agent
  # opens a DRAFT pull request fixing it. See:
  #   .openspec/specs/issue-autofix.spec.yaml
  #   .github/agents/issue-autofix.md
  #   .github/workflows/issue-autofix.yml
  # OFF by default — opt in once you've reviewed the security model.
  issue_autofix:
    enabled: false
    label: "agent:autofix"
    model: "anthropic/claude-sonnet-4-6"
    goal_file: ".github/agents/issue-autofix.md"
    # Hard caps on the agent's branch — exceeding either aborts the run.
    max_changed_files: 20
    max_diff_lines: 500
    # Paths the agent must NOT edit unless the issue body contains
    # `agent:autofix-allow-sensitive` AND a second CODEOWNER comments
    # `agent:autofix-approve-sensitive` on the issue.
    sensitive_paths:
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
      - ".github/agents/**"
      - "SECURITY.md"
      - ".openspec/config.yaml"
      - "setup.sh"
      - "hooks/**"
      - ".claude/hooks/**"

  implementation_skills:
    frontend: "frontend-pro"
    backend: "backend-pro"
    data: "data-eng-pro"
    devops: "devops-pro"
    mobile: "mobile-pro"
    default: null   # null = no domain skill, Claude handles implementation directly

hooks:
  pre_commit:
    enabled: true
    block_if_no_spec: true
    warn_only: false
  commit_msg:
    enabled: true
    require_spec_reference: false
    pattern: "spec: <slug>"
